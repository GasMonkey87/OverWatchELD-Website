<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trucky Dispatcher | OverWatch ELD</title><link rel="stylesheet" href="../assets/styles.css?v=trucky-dispatcher-v1"><style>.app{background:#12111d;color:#eee}.tabs{display:flex;gap:30px;border-bottom:1px solid #34324a;margin-bottom:14px}.tabs button{background:0;border:0;color:#77708f;padding:14px 0;font-size:16px;cursor:pointer}.tabs button.active{color:#fff;border-bottom:2px solid #c2185b}.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin:12px 0}.row2{display:grid;grid-template-columns:1fr 1fr;gap:22px}.field label{display:block;color:#88839a;margin-bottom:6px}.input,select,textarea{width:100%;background:#1d1b2b;border:1px solid #35334d;border-radius:7px;color:#e9e8f4;padding:12px;font-size:15px}.switches{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin:8px 0 18px}.switch{display:flex;gap:8px;align-items:center;color:#d8d5e8}.switch input{accent-color:#17c998}.market{display:grid;grid-template-columns:1fr 1fr;margin:12px 0}.market button{padding:14px;border:0;background:#34324a;color:#fff;cursor:pointer}.market button.active{background:#bd174f}.section-title{color:#a6a0b9;margin:18px 0 8px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}.btn-green{background:#11c987;color:#fff;border:0;border-radius:6px;padding:12px 22px;font-weight:900;cursor:pointer}.btn-gray{background:#36344e;color:#fff;border:0;border-radius:6px;padding:12px 22px;font-weight:900;cursor:pointer}.load-board{margin-top:24px;border-top:1px solid #34324a;padding-top:16px}.load-card{background:#1d1b2b;border:1px solid #35334d;border-radius:8px;padding:12px;margin:8px 0}.hint{color:#928da5;font-size:13px;margin-top:6px}.hidden{display:none}@media(max-width:900px){.row,.row2{grid-template-columns:1fr}.tabs{gap:14px;overflow:auto}}</style></head><body class="app"><main id="app" class="wrap" data-api-base="https://api.overwatcheld.com" style="padding-top:20px"><div class="tabs"><button class="active">Dispatcher</button><button>Personal Jobs</button><button>Community Created</button><button>Company Jobs</button></div><div class="row"><div class="field"><label>Game</label><select id="game"><option>American Truck Simulator</option><option>Euro Truck Simulator 2</option></select></div><div class="field"><label>Profiles</label><select id="profile"><option>Current OverWatch ELD Profile</option></select></div><div class="field"><label>Save</label><select id="save"><option>Current ATS/SCS Save</option></select></div></div><div class="switches"><label class="switch"><input id="legacy" type="checkbox" checked> Use Legacy SII Decrypt</label><label class="switch"><input id="debug" type="checkbox"> Debug Info</label></div><div class="field" style="max-width:480px"><label>Import Dispatch</label><input id="importId" class="input" placeholder="Insert Unique ID here"></div><div class="section-title">Delivery</div><div class="market"><button id="freightBtn" class="active" type="button">Freight market</button><button id="cargoBtn" type="button">Cargo market</button></div><div class="row2"><div class="field"><label>Source City</label><select id="sourceCity"></select><label class="switch hint"><input id="onlyDiscovered" type="checkbox"> Only discovered</label></div><div class="field"><label>Destination City</label><select id="destCity"></select><label class="switch hint"><input id="onlyUndiscovered" type="checkbox"> Only undiscovered</label></div></div><div class="row2"><div class="field"><label>Source Company</label><select id="sourceCompany"></select><label class="switch hint"><input id="teleport" type="checkbox"> Teleport at location ★</label></div><div class="field"><label>Destination Company</label><select id="destCompany"></select></div></div><div class="row"><div class="field"><label>Cargo</label><select id="cargo"></select><div id="cargoWarn" class="hint"></div><label class="switch hint"><input id="showAllCargo" type="checkbox"> Show all cargoes</label></div><div class="field"><label>Trailer definition</label><select id="trailer"></select><div id="trailerDesc" class="hint"></div></div><div class="field"><label>Trailer variant</label><select id="variant"></select></div></div><div class="row"><div class="field"><label>Urgency</label><select id="urgency"><option>Normal</option><option>Important</option><option>Urgent</option></select></div><div class="field"><label>Load Type</label><select id="loadType"><option value="company">Company Load</option><option value="assigned">Assigned Load</option><option value="community">Community Load</option></select></div><div class="field"><label>Assign Driver</label><select id="driver"></select></div></div><div class="row"><div class="field"><label>Miles</label><input id="miles" class="input"></div><div class="field"><label>Revenue</label><input id="revenue" class="input"></div><div class="field"><label>BOL</label><input id="bol" class="input" readonly placeholder="Auto-generated by VTC load creation"></div></div><div class="field"><label>Add to existing Dispatch List</label><input id="dispatchListId" class="input" placeholder="Insert Unique ID here"></div><div class="actions"><button id="addDelivery" class="btn-green">＋ Add delivery</button><button id="pushEld" class="btn-gray">Push to ELD Load Board</button><button id="refresh" class="btn-gray">Refresh Board</button></div><div id="msg" class="notice hidden"></div><section class="load-board"><h2>Published Company Jobs</h2><div id="board"></div></section></main><script>(function(){const api=document.getElementById('app').dataset.apiBase,token=localStorage.getItem('oweld_session_token')||'',gid=new URLSearchParams(location.search).get('guildId')||localStorage.getItem('oweld_guild_id')||'';if(!token)location.href='../login/?returnUrl=/dispatch/';let loads=[],roster=[];const cities=['Cheyenne','Truckee','Chicago','Brownsville','Dallas','Houston','Los Angeles','Phoenix','Denver','Salt Lake City','Reno','Las Vegas','Fresno','San Diego'];const companies=['Wallbert','SellGoods','Rail Export','Voltison Motors','42 Print','Plaster & Sons','Farmer\'s Barn','Bushnell Farms','Deepgrove','Home Store','Coastline Mining','Drake Car Dealer','Gallon Oil'];const trailers=[{id:'scs_dryvan_53',name:'SCS Dry Van 53 ft',desc:'Box / dry van',c:['Office Supplies','Beverages','Paper','Electronics','Empty Pallets','Used Packaging']},{id:'scs_reefer_53',name:'SCS Reefer 53 ft',desc:'Refrigerated trailer',c:['Frozen Food','Fresh Vegetables','Medical Supplies']},{id:'scs_lowboy_triple',name:'SCS Lowboy Triple 3 axles',desc:'Triple Lowboy Wood 3 axles',c:['Dozer Crawl - Z35K [H]','Construction Houses','Forklifts','Cars']},{id:'scs_flatbed_48',name:'SCS Flatbed 48 ft',desc:'Flatbed standard',c:['Lumber','Dynamite','Forklifts']},{id:'scs_tanker',name:'SCS Tanker',desc:'Tanker / food tank',c:['Diesel','Milk']}];function id(x){return document.getElementById(x)}function fill(sel,arr){id(sel).innerHTML=arr.map(x=>'<option value="'+esc(typeof x==='string'?x:x.id)+'">'+esc(typeof x==='string'?x:x.name)+'</option>').join('')}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}fill('sourceCity',cities);fill('destCity',cities);fill('sourceCompany',companies);fill('destCompany',companies);fill('trailer',trailers);fill('variant',['scs_default','scs_333_s','scs_painted','scs_wood','scs_spread']);id('sourceCity').value='Cheyenne';id('destCity').value='Truckee';id('sourceCompany').value='Wallbert';id('destCompany').value='SellGoods';id('trailer').onchange=updateCargo;id('cargo').onchange=calc;id('sourceCity').onchange=calc;id('destCity').onchange=calc;id('loadType').onchange=()=>id('driver').disabled=id('loadType').value!=='assigned';id('freightBtn').onclick=()=>market('freight');id('cargoBtn').onclick=()=>market('cargo');id('addDelivery').onclick=publish;id('pushEld').onclick=publish;id('refresh').onclick=loadBoard;function market(m){id('freightBtn').classList.toggle('active',m==='freight');id('cargoBtn').classList.toggle('active',m==='cargo')}function updateCargo(){const t=trailers.find(x=>x.id===id('trailer').value)||trailers[0];id('trailerDesc').textContent=t.desc;fill('cargo',t.c);id('cargoWarn').textContent=t.c.some(x=>x.includes('[H]'))?'⚠ Heavy Cargo':'';calc()}function calc(){const a=cities.indexOf(id('sourceCity').value),b=cities.indexOf(id('destCity').value);const mi=Math.max(120,Math.abs(a-b)*105+172);id('miles').value=mi;id('revenue').value='$'+(mi*(id('urgency').value==='Urgent'?38:30)).toLocaleString()}async function get(p){const r=await fetch(api+p,{headers:{Authorization:'Bearer '+token,'X-OverWatch-Session':token},cache:'no-store'});if(!r.ok)throw new Error('Request failed '+r.status);return r.json()}async function post(p,b){const r=await fetch(api+p,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-OverWatch-Session':token},body:JSON.stringify(b)});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error(d.error||'Save failed');return d}async function loadBoard(){try{const d=await get('/api/vtc/portal/loads?guildId='+encodeURIComponent(gid));loads=d.loads||[];let p;try{p=await get('/api/portal/me-email?guildId='+encodeURIComponent(gid))}catch{p=await get('/api/portal/me?guildId='+encodeURIComponent(gid))}roster=p.roster||p.drivers||[];id('driver').innerHTML='<option value="">Select driver...</option>'+roster.map(x=>'<option>'+esc(x.userName||x.name||'Driver')+'</option>').join('');id('driver').disabled=id('loadType').value!=='assigned';render();msg('Synced',false)}catch(e){msg(e.message,true)}}function render(){id('board').innerHTML=loads.map(x=>'<div class="load-card"><strong>'+esc(x.loadNumber||'Load')+' • '+esc(x.cargo||'Cargo')+'</strong><span>'+esc(x.origin||'')+' / '+esc(x.originCompany||'')+' → '+esc(x.destination||'')+' / '+esc(x.destinationCompany||'')+'</span><span>'+esc(x.status||'Available')+' • '+esc(x.assignedDriver||'Company Wide')+' • '+esc(x.revenue||'')+'</span></div>').join('')||'<div class="load-card"><strong>No loads published</strong><span>Create one above.</span></div>'}async function publish(){try{const type=id('loadType').value,driver=type==='assigned'?id('driver').value:'';if(type==='assigned'&&!driver)throw new Error('Select a driver for Assigned Load.');const body={loadNumber:'',status:driver?'Assigned':'Available',title:'Trucky Dispatcher Load',cargo:id('cargo').value,trailer:id('trailer').options[id('trailer').selectedIndex].text,weight:'',origin:id('sourceCity').value,originCompany:id('sourceCompany').value,destination:id('destCity').value,destinationCompany:id('destCompany').value,miles:id('miles').value,revenue:id('revenue').value,assignedDriver:driver,assignedTruck:'',bolUrl:'',receiptUrl:'',notes:'Market: '+(id('freightBtn').classList.contains('active')?'Freight':'Cargo')+'\nUrgency: '+id('urgency').value+'\nLoad Type: '+type+'\nSource: ATS/SCS Trucky-style dispatcher',dispatcher:'Trucky-style Dispatcher',isCompanyLoad:type!=='community'};await post('/api/vtc/portal/loads?guildId='+encodeURIComponent(gid),body);await loadBoard()}catch(e){msg(e.message,true)}}function msg(t,e){const m=id('msg');m.classList.remove('hidden');m.textContent=t;m.classList.toggle('error-notice',!!e)}updateCargo();loadBoard()})();</script></body></html>
