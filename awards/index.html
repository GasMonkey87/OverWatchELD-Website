<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Awards Window | OverWatch ELD</title><link rel="stylesheet" href="../assets/styles.css?v=awards-window-v1"><style>.award-grid{display:grid;grid-template-columns:360px 1fr;gap:18px}.award-list{display:grid;gap:10px;max-height:720px;overflow:auto}.award-row,.award-card{border:1px solid var(--border);border-radius:16px;background:#0b121a;padding:13px}.award-row{cursor:pointer}.award-row:hover{border-color:var(--gold)}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.wide{grid-column:1/-1}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:18px}@media(max-width:1000px){.award-grid,.form,.cards{grid-template-columns:1fr}}</style></head><body><header class="header"><nav class="nav"><a class="brand" href="../"><span class="brand-mark">OW</span><span>OverWatch ELD</span></a><div class="nav-links"><a href="../operations/">Operations</a><a href="../portal/admin/">Admin</a><a href="../portal/">Portal</a></div></nav></header><main id="app" class="portal-shell" data-api-base="https://api.overwatcheld.com"><section class="hero"><div class="wrap hero-grid"><div><div class="kicker">Awards Window</div><h1>Driver Awards & Achievements</h1><p class="lead">Assign, view, and manage driver awards synced to the VTC portal.</p><div class="actions"><button id="refresh" class="btn">Refresh</button><button id="newAward" class="btn secondary">New Award</button></div><div id="msg" class="notice" hidden></div></div><div class="panel"><h3>Award Stats</h3><div class="status-row"><span>Roster</span><strong id="driverCount">0</strong></div><div class="status-row"><span>Awards</span><strong id="awardCount">0</strong></div><div class="status-row"><span>Featured</span><strong id="featuredCount">0</strong></div></div></div></section><section class="wrap award-grid"><aside class="panel"><div class="section-title-row"><h2>Drivers</h2><input id="search" class="input" placeholder="Search drivers..."></div><div id="driverList" class="award-list"></div></aside><section class="panel"><div class="kicker">Award Editor</div><h2 id="editorTitle">Select a driver</h2><div class="form"><label>Driver<input id="driverName" class="input"></label><label>Discord ID<input id="discordId" class="input"></label><label>Award Name<input id="awardName" class="input" placeholder="Safe Driver Award"></label><label>Role<input id="role" class="input"></label><label class="wide">Notes / Description<textarea id="notes" class="input"></textarea></label></div><div class="actions" style="margin-top:14px"><button id="saveAward" class="btn">Assign Award</button><a id="adminAwards" class="btn secondary" href="../portal/admin/#awards">Admin Awards</a></div><div class="cards" id="awardCards"></div></section></section></main><footer class="footer"><div class="wrap"><span>OverWatch ELD © 2026 Gas Monkey Creations</span></div></footer><script>(function(){const base=document.getElementById('app').dataset.apiBase,token=localStorage.getItem('oweld_session_token')||'',gid=new URLSearchParams(location.search).get('guildId')||localStorage.getItem('oweld_guild_id')||'';let roster=[],awards=[];if(!token)location.href='../login/?returnUrl=/awards/';id('refresh').onclick=load;id('newAward').onclick=()=>select({});id('saveAward').onclick=save;id('search').oninput=renderDrivers;if(gid)id('adminAwards').href='../portal/admin/?guildId='+encodeURIComponent(gid)+'#awards';async function get(p){const r=await fetch(base+p,{headers:{Authorization:'Bearer '+token,'X-OverWatch-Session':token},cache:'no-store'});if(!r.ok)throw new Error('Request failed '+r.status);return r.json()}async function post(p,b){const r=await fetch(base+p,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token,'X-OverWatch-Session':token},body:JSON.stringify(b)});const d=await r.json().catch(()=>({}));if(!r.ok||d.ok===false)throw new Error(d.error||'Save failed');return d}async function load(){try{let d;try{d=await get('/api/portal/me-email?guildId='+encodeURIComponent(gid))}catch{d=await get('/api/portal/me?guildId='+encodeURIComponent(gid))}roster=d.roster||d.drivers||[];awards=d.awards||d.achievements||[];text('driverCount',roster.length);text('awardCount',awards.length);text('featuredCount',awards.length);renderDrivers();renderAwards();ok('Awards synced',false)}catch(e){ok(e.message,true)}}function renderDrivers(){const q=id('search').value.toLowerCase();const rows=q?roster.filter(x=>JSON.stringify(x).toLowerCase().includes(q)):roster;id('driverList').innerHTML=rows.map((x,i)=>'<div class="award-row" data-i="'+i+'"><strong>'+esc(x.userName||x.name||'Driver')+'</strong><span>'+esc(x.role||'Driver')+' • '+esc(x.currentTruck||x.assignedTruck||'Unassigned')+'</span><span>Awards: '+esc(x.achievement||x.Achievement||x.awards||'None')+'</span></div>').join('')||'<div class="award-row"><strong>No drivers</strong><span>Roster sync data will appear here.</span></div>';document.querySelectorAll('[data-i]').forEach(el=>el.onclick=()=>select(rows[+el.dataset.i]))}function renderAwards(){id('awardCards').innerHTML=(awards||[]).map(x=>'<div class="award-card"><div class="kicker">Award</div><h3>'+esc(x.title||x.name||x.Achievement||'Award')+'</h3><p>'+esc(x.body||x.description||x.Bio||'')+'</p></div>').join('')||'<div class="award-card"><h3>No awards yet</h3><p>Assign an award to feature it.</p></div>'}function select(x){id('editorTitle').textContent=(x.userName||x.name)?'Award '+(x.userName||x.name):'New Award';id('driverName').value=x.userName||x.name||'';id('discordId').value=x.discordUserId||x.DiscordUserId||'';id('role').value=x.role||x.Role||'Driver';id('awardName').value=x.achievement||x.Achievement||'';id('notes').value=x.bio||x.Bio||''}async function save(){const payload={Id:id('discordId').value||'',Name:id('driverName').value,Role:id('role').value||'Driver',DiscordUserId:id('discordId').value,Achievement:id('awardName').value,Bio:id('notes').value,Status:'Member'};await post('/api/vtc/portal/drivers?guildId='+encodeURIComponent(gid),payload);ok('Award assigned. Refreshing...',false);await load()}function id(x){return document.getElementById(x)}function text(x,v){id(x).textContent=v}function ok(t,e){const m=id('msg');m.hidden=false;m.textContent=t;m.classList.toggle('error-notice',!!e)}function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}load()})();</script></body></html>
