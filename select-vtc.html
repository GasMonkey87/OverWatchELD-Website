<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>OverWatch ELD Live Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css">
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <style>
        :root {
            --bg: #070b10;
            --panel: rgba(12, 18, 26, 0.88);
            --panelBorder: rgba(255,255,255,0.08);
            --text: #e8eef7;
            --muted: #a8b6c9;
            --truckStop: #ffb24d;
            --depot: #58d68d;
            --rest: #c084fc;
            --weigh: #ff6b6b;
            --garage: #65b9ff;
            --company: #36d399;
            --drive: #4da3ff;
            --onduty: #ffcf66;
            --sleeper: #b388ff;
            --offduty: #a7b0bf;
            --stale: #5f6b7a;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            overflow: hidden;
            font-family: Segoe UI, system-ui, sans-serif;
        }

        #map {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 18% 18%, rgba(52,86,132,.18), transparent 32%), radial-gradient(circle at 82% 72%, rgba(30,54,92,.12), transparent 38%), linear-gradient(180deg, #080d13 0%, #0d131c 100%);
        }

        .panelShell {
            pointer-events: auto;
        }

        .collapseBtn {
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.07);
            color: var(--text);
            border-radius: 10px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
        }

            .collapseBtn:hover {
                background: rgba(255,255,255,.12);
            }

        .topWrap {
            position: absolute;
            left: 14px;
            top: 14px;
            right: 14px;
            display: flex;
            justify-content: flex-start;
            pointer-events: none;
            z-index: 20;
        }

        .topBar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        .topBarHeader {
            display: flex;
            justify-content: flex-start;
        }

        .hud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            background: var(--panel);
            border: 1px solid var(--panelBorder);
            border-radius: 16px;
            padding: 10px 12px;
            color: var(--text);
            box-shadow: 0 16px 40px rgba(0,0,0,.42);
            backdrop-filter: blur(12px);
            max-width: min(1180px, calc(100vw - 28px));
            pointer-events: auto;
        }

            .hud.collapsed {
                display: none;
            }

        .pill {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.085);
            font-size: 12px;
            color: var(--text);
            white-space: nowrap;
        }

            .pill.good {
                color: #dff8e8;
                border-color: rgba(75,211,138,.3);
                background: rgba(75,211,138,.12);
            }

            .pill.warn {
                color: #fff3d2;
                border-color: rgba(255,207,102,.28);
                background: rgba(255,207,102,.10);
            }

            .pill.bad {
                color: #ffe0e0;
                border-color: rgba(255,123,123,.28);
                background: rgba(255,123,123,.10);
            }

        .hud button {
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.07);
            color: var(--text);
            border-radius: 12px;
            padding: 7px 10px;
            cursor: pointer;
            font-size: 12px;
        }

            .hud button:hover {
                background: rgba(255,255,255,.12);
            }

            .hud button.active {
                background: rgba(77,163,255,.18);
                border-color: rgba(77,163,255,.45);
            }

        .legendWrap {
            position: absolute;
            left: 14px;
            bottom: 14px;
            z-index: 18;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
        }

        .legendPanel {
            background: rgba(10,16,24,.78);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 14px;
            padding: 8px 10px;
            box-shadow: 0 12px 32px rgba(0,0,0,.32);
            backdrop-filter: blur(10px);
            color: var(--muted);
            font-size: 11px;
            max-width: 350px;
        }

            .legendPanel.collapsed {
                display: none;
            }

        .legendTitle {
            color: var(--text);
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: .03em;
        }

        .legendGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }

        .legendItem {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 999px;
            display: inline-block;
            flex: 0 0 auto;
        }

        .statusMini {
            position: absolute;
            right: 14px;
            bottom: 14px;
            z-index: 20;
            min-width: 180px;
            max-width: 260px;
            background: rgba(10,16,24,.72);
            border: 1px solid rgba(255,255,255,.08);
            color: var(--text);
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0,0,0,.28);
            backdrop-filter: blur(10px);
            padding: 10px 12px;
            font-size: 11px;
            line-height: 1.35;
        }

            .statusMini .row {
                display: flex;
                justify-content: space-between;
                gap: 10px;
                margin: 2px 0;
            }

            .statusMini .label {
                color: var(--muted);
            }

            .statusMini .value {
                color: var(--text);
                text-align: right;
            }

        .driverLabel {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            text-shadow: 0 2px 6px rgba(0,0,0,.95);
            white-space: nowrap;
            pointer-events: none;
        }

        .truckSubLabel {
            color: #d7e6f7;
            font-size: 10px;
            font-weight: 600;
            text-shadow: 0 2px 6px rgba(0,0,0,.95);
            white-space: nowrap;
            pointer-events: none;
            opacity: .95;
        }

        .truckMarkerWrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transform-origin: center center;
        }

        .truckMarker {
            width: 24px;
            height: 24px;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,.9);
            box-shadow: 0 0 0 2px rgba(34,197,94,.18), 0 8px 18px rgba(0,0,0,.45);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #34d399, #10b981);
            color: #03140f;
            font-size: 13px;
            font-weight: 800;
        }

            .truckMarker.stale {
                background: linear-gradient(180deg, #8a96a8, #64748b);
                box-shadow: 0 0 0 2px rgba(148,163,184,.16), 0 8px 18px rgba(0,0,0,.45);
            }

            .truckMarker.offduty {
                background: linear-gradient(180deg, #cbd5e1, #94a3b8);
            }

            .truckMarker.onduty {
                background: linear-gradient(180deg, #ffd77a, #ffb84d);
            }

            .truckMarker.sleeper {
                background: linear-gradient(180deg, #c4a4ff, #9b7cff);
            }

        .stateTextLabel {
            color: #7ea4c8;
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(0,0,0,.95);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0.80;
        }

        .cityTextLabel {
            color: #f3f7fd;
            font-size: 12px;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(0,0,0,.95);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0.95;
        }

        .poiIconWrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            pointer-events: none;
        }

        .poiIcon {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 1.5px solid rgba(255,255,255,.92);
            box-shadow: 0 4px 12px rgba(0,0,0,.38);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #081018;
            background: #9fb3c8;
        }

            .poiIcon.truck_stop {
                background: var(--truckStop);
            }

            .poiIcon.depot {
                background: var(--depot);
            }

            .poiIcon.company {
                background: var(--company);
            }

            .poiIcon.weigh_station {
                background: var(--weigh);
                color: #fff;
            }

            .poiIcon.garage {
                background: var(--garage);
                color: #06223c;
            }

        .vtcGarageMarker {
            width: 34px;
            height: 34px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #3b82f6, #2563eb);
            border: 2px solid rgba(255,255,255,.92);
            color: white;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 0 16px rgba(37,99,235,.65);
        }

            .vtcGarageMarker.home {
                background: linear-gradient(180deg, #fbbf24, #f59e0b);
                box-shadow: 0 0 18px rgba(245,158,11,.95);
                color: #1f2937;
            }

        .vtcGaragePopupTitle {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 8px;
        }

            .poiIcon.rest_area {
                background: var(--rest);
                color: #fff;
            }

        .poiLabel {
            font-size: 10px;
            color: #dce6f3;
            text-shadow: 0 1px 4px rgba(0,0,0,.95);
            white-space: nowrap;
            opacity: .92;
            display: none;
        }

        .maplibregl-popup-content {
            background: rgba(11,17,25,.96);
            color: var(--text);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,.08);
            box-shadow: 0 16px 40px rgba(0,0,0,.38);
            min-width: 240px;
        }

        .maplibregl-popup-close-button {
            color: #d5deea;
            font-size: 18px;
        }

        .popupTitle {
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .popupRow {
            color: var(--muted);
            font-size: 12px;
            margin-top: 2px;
        }
    </style>
</head>

            </div>
        </div>
    </div>

        function setPill(el, text, kind) {
        el.textContent = text;
        el.className = `pill ${kind || ""}`.trim();

        function safe(v, fallback = "") {
        return v == null ? fallback : String(v);
        }

        function escapeHtml(v) {
        return safe(v)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
        }

        function normalizeKey(v) {
        return safe(v).trim().toLowerCase();
        }

        function dutyClass(duty) {
        const s = safe(duty).toLowerCase();
        if (s.includes("drive")) return "";
        if (s.includes("on")) return "onduty";
        if (s.includes("sleep")) return "sleeper";
        if (s.includes("off")) return "offduty";
        return "";
        }

        function getDriverId(d) {
        return safe(d.driverId || d.discordUserId || d.userId || d.driverName || d.name || Math.random());
        }

        function getDriverName(d) {
        return safe(d.driverName || d.name || d.username || d.driverId || "Driver");
        }

        function getFleetMatch(d) {
        const driverId = normalizeKey(d.discordUserId || d.userId || d.driverId);
        const driverName = normalizeKey(d.driverName || d.name || d.username);

        for (const f of state.fleetRoster || []) {
        const fleetDiscordId = normalizeKey(f.discordUserId);
        const fleetDiscordUser = normalizeKey(f.discordUsername);
        const fleetDriverName = normalizeKey(f.driverName);

        if (driverId && fleetDiscordId && driverId === fleetDiscordId)
        return f;

        if (driverName && fleetDiscordUser && driverName === fleetDiscordUser)
        return f;

        if (driverName && fleetDriverName && driverName === fleetDriverName)
        return f;
        }

        return null;
        }

        function getTruckDisplay(d) {
        const fleet = getFleetMatch(d);
        if (!fleet) return "";
        const truck = safe(fleet.truckName || fleet.model || "Truck");
        const plate = safe(fleet.plateNumber);
        return plate ? `${truck} • ${plate}` : truck;
        }

        function getHeading(d) {
        const n = Number(d.headingDeg ?? d.heading ?? 0);
        return Number.isFinite(n) ? n : 0;
        }

        function getSpeed(d) {
        const n = Number(d.speedMph ?? d.speed ?? 0);
        return Number.isFinite(n) ? n : 0;
        }

        function getLngLat(d) {
        const lon = Number(d.longitude ?? d.lng ?? d.lon);
        const lat = Number(d.latitude ?? d.lat);

        if (
        Number.isFinite(lon) &&
        Number.isFinite(lat) &&
        Math.abs(lon) > 0.01 &&
        Math.abs(lat) > 0.01
        ) {
        return [lon, lat];
        }

        const x = Number(d.worldX ?? d.markerX ?? d.x);
        const z = Number(d.worldZ ?? d.markerY ?? d.y ?? d.z);

        if (
        Number.isFinite(x) &&
        Number.isFinite(z) &&
        (Math.abs(x) > 0.01 || Math.abs(z) > 0.01)
        ) {
        return [x, z];
        }

        return null;
        }

        function isFresh(d) {
        const ts = d.serverTsUtc || d.timestampUtc || d.updatedAtUtc || d.updatedUtc || null;
        if (!ts) return true;
        const ms = Date.now() - new Date(ts).getTime();
        return Number.isFinite(ms) ? ms < 120000 : true;
        }

        function animateMarkerTo(entry, nextLngLat, duration = 1200) {
        if (!entry || !nextLngLat) return;

        const start = performance.now();
        const from = entry.currentLngLat || nextLngLat;
        const to = nextLngLat;
        entry.targetLngLat = nextLngLat;

        function step(now) {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);

        const lng = from[0] + (to[0] - from[0]) * eased;
        const lat = from[1] + (to[1] - from[1]) * eased;

        entry.currentLngLat = [lng, lat];
        entry.marker.setLngLat(entry.currentLngLat);

        if (t < 1) requestAnimationFrame(step);
        else {
        entry.currentLngLat = to;
        entry.marker.setLngLat(to);
        }
        }

        requestAnimationFrame(step);
        }

        async function resolveGuildId() {
        const queryGuild = safe(getQueryValue("guildId") || getQueryValue("serverId") || "").trim();
        if (queryGuild && queryGuild !== "0") {
        state.resolvedGuildId = queryGuild;
        return queryGuild;
        }

        const cfgGuild = safe(state.cfg?.guildId || "0").trim();
        if (cfgGuild && cfgGuild !== "0") {
        state.resolvedGuildId = cfgGuild;
        return cfgGuild;
        }

        if (isLocalMapHost()) {
        state.resolvedGuildId = "local";
        return "local";
        }

        const base = getRemoteApiBase();
        if (!base) {
        state.resolvedGuildId = "0";
        return "0";
        }

        try {
        const res = await fetch(`${base}/api/vtc/servers`, { cache: "no-store" });
        if (!res.ok) {
        state.resolvedGuildId = "0";
        return "0";
        }

        const json = await res.json();
        const servers = Array.isArray(json) ? json : (Array.isArray(json?.servers) ? json.servers : []);
        const first = servers.length > 0 ? servers[0] : null;
        const id = safe(first?.id || first?.guildId || first?.serverId || "0").trim();

        state.resolvedGuildId = id || "0";
        return state.resolvedGuildId;
        } catch {
        state.resolvedGuildId = "0";
        return "0";
        }
        }

        function normalizeDrivers(json) {
        if (Array.isArray(json)) return json;
        if (Array.isArray(json?.drivers)) return json.drivers;
        if (Array.isArray(json?.locations)) return json.locations;
        if (Array.isArray(json?.data)) return json.data;
        if (Array.isArray(json?.items)) return json.items;

        const single = json?.telemetry || json?.driver || json?.location || json?.current || json?.snapshot;
        if (single && typeof single === "object" && !Array.isArray(single)) return [single];

        if (json?.data && typeof json.data === "object" && !Array.isArray(json.data)) {
        return Object.entries(json.data).map(([key, value]) => ({
        ...(value || {}),
        driverId: safe(value?.driverId || value?.discordUserId || value?.userId || value?.driverDiscordUserId || key),
        discordUserId: safe(value?.discordUserId || value?.userId || value?.driverDiscordUserId || value?.driverId || key),
        userId: safe(value?.userId || value?.discordUserId || value?.driverDiscordUserId || value?.driverId || key)
        }));
        }

        return [];
        }

        async function fetchDriverPayload(base, guildId) {
        const urls = isLocalMapHost()
        ? [
        `${base}/api/telemetry`,
        `${base}/api/dashboard`,
        `${base}/api/sync/state`
        ]
        : [
        `${base}/api/telemetry?guildId=${encodeURIComponent(guildId)}`,
        `${base}/api/location/latest?guildId=${encodeURIComponent(guildId)}`,
        `${base}/api/location?guildId=${encodeURIComponent(guildId)}`,
        `${base}/api/locations?guildId=${encodeURIComponent(guildId)}`,
        `${base}/api/live/locations?guildId=${encodeURIComponent(guildId)}`
        ];

        for (const url of urls) {
        try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) continue;

        const json = await res.json();
        let drivers = normalizeDrivers(json);

        drivers = drivers.filter(d => !!getLngLat(d));

        if (drivers.length > 0) {
        return { url, drivers };
        }

        if (Array.isArray(json) || json?.drivers || json?.locations || json?.data || json?.items || json?.telemetry) {
        return { url, drivers };
        }
        } catch {
        }
        }

        return { url: urls[0], drivers: [] };
        }

        function fitMapToDrivers(drivers) {
        if (!state.map || !Array.isArray(drivers) || drivers.length === 0) return;

        const points = drivers
        .map(getLngLat)
        .filter(p => Array.isArray(p) && Number.isFinite(p[0]) && Number.isFinite(p[1]));

        if (points.length === 0) return;

        if (points.length === 1) {
        state.map.easeTo({
        center: points[0],
        zoom: Math.max(state.map.getZoom(), 7),
        duration: 1200
        });
        return;
        }

        const bounds = new maplibregl.LngLatBounds(points[0], points[0]);
        for (const p of points) bounds.extend(p);

        state.map.fitBounds(bounds, {
        padding: 80,
        duration: 1200,
        maxZoom: 9
        });
        }

        function colorExpr() {
        return [
        "match",
        ["coalesce", ["get", "color"], -1],
        0, "#0f1822",
        1, "#142231",
        2, "#173042",
        3, "#112131",
        4, "#193449",
        5, "#142838",
        "#13202c"
        ];
        }

        ],
        "line-opacity": 0.42
        }
        });
        }
        }

        addTextLabelMarkers();
        addPoiAndFacilityMarkers();
        state.stateMode = "embedded";
        } catch (err) {
        console.error("Overlays failed:", err);
        state.stateMode = "unavailable";
        }
        }

        function addFallbackSourcesAndLayers() {
        const style = {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {},
        layers: [{
        id: "bg",
        type: "background",
        paint: { "background-color": "#081018" }
        }]
        };

        state.map.setStyle(style);

        state.map.once("styledata", async () => {
        state.mapMode = "fallback";
        state.roadsMode = "fallback";
        state.poisMode = "html";
        setPill(els.pillMap, "MAP: Fallback", "warn");
        refreshMiniStatus("Fallback");
        await addOverlays();
        updateButtons();
        });
        }

        async function detectSourceLayer(pmtilesUrl) {
        const p = new PMTiles(pmtilesUrl);
        const header = await p.getHeader();
        const metadata = await p.getMetadata();
        const vectorLayers = metadata?.vector_layers || [];

        if (vectorLayers.length > 0 && vectorLayers[0]?.id)
        return vectorLayers[0].id;

        return header?.json_metadata?.vector_layers?.[0]?.id || "default";
        }

        async function addAtsPmtilesStyle() {
        const cfg = state.cfg || {};
        if (!cfg.hasAtsPmtiles || !cfg.atsPmtilesUrl) {
        addFallbackSourcesAndLayers();
        return;
        }

        try {
        maplibregl.addProtocol("pmtiles", new Protocol().tile);
        const sourceLayer = await detectSourceLayer(cfg.atsPmtilesUrl);
        state.sourceLayerName = sourceLayer;

        const atsStyle = {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {
        ats: {
        type: "vector",
        url: `pmtiles://${cfg.atsPmtilesUrl}`
        }
        },
        layers: [
        {
        id: "bg",
        type: "background",
        paint: { "background-color": "#081018" }
        },
        {
        id: "ats-polygons",
        type: "fill",
        source: "ats",
        "source-layer": sourceLayer,
        minzoom: 4,
        paint: {
        "fill-color": colorExpr(),
        "fill-opacity": 0.76
        }
        },
        {
        id: "ats-roads-glow",
        type: "line",
        source: "ats",
        "source-layer": sourceLayer,
        minzoom: 4,
        filter: ["has", "roadType"],
        layout: {
        visibility: state.showRoads ? "visible" : "none",
        "line-join": "round",
        "line-cap": "round"
        },
        paint: {
        "line-color": [
        "match",
        ["get", "roadType"],
        "freeway", "#4fc3ff",
        "highway", "#4fc3ff",
        "#295d86"
        ],
        "line-width": [
        "interpolate", ["linear"], ["zoom"],
        4, 2.5, 6, 4.2, 8, 6.4, 10, 8.2, 13, 11
        ],
        "line-opacity": 0.16,
        "line-blur": 1.2
        }
        },
        {
        id: "ats-roads-casing",
        type: "line",
        source: "ats",
        "source-layer": sourceLayer,
        minzoom: 4,
        filter: ["has", "roadType"],
        layout: {
        visibility: state.showRoads ? "visible" : "none",
        "line-join": "round",
        "line-cap": "round"
        },
        paint: {
        "line-color": "#13263b",
        "line-width": [
        "interpolate", ["linear"], ["zoom"],
        4, 1.8, 6, 3.1, 8, 4.6, 10, 6.2, 13, 8.6
        ],
        "line-opacity": 0.96
        }
        },
        {
        id: "ats-roads",
        type: "line",
        source: "ats",
        "source-layer": sourceLayer,
        minzoom: 4,
        filter: ["has", "roadType"],
        layout: {
        visibility: state.showRoads ? "visible" : "none",
        "line-join": "round",
        "line-cap": "round"
        },
        paint: {
        "line-color": [
        "match",
        ["get", "roadType"],
        "freeway", "#6cc7ff",
        "highway", "#5fb7f4",
        "local", "#4d7ea8",
        "small", "#395d7b",
        "ferry", "#4fd1ff",
        "#5a89b7"
        ],
        "line-width": [
        "interpolate", ["linear"], ["zoom"],
        4, 0.8, 6, 1.5, 8, 2.4, 10, 3.6, 13, 5.2
        ],
        "line-opacity": 0.98
        }
        },
        {
        id: "ats-poi-circles",
        type: "circle",
        source: "ats",
        "source-layer": sourceLayer,
        minzoom: 5,
        filter: ["all", ["==", ["geometry-type"], "Point"], ["has", "poiType"]],
        layout: { visibility: "none" },
        paint: { "circle-radius": 1, "circle-opacity": 0 }
        }
        ]
        };

        state.map.setStyle(atsStyle);

        state.map.once("styledata", async () => {
        state.mapMode = "ats";
        state.roadsMode = "ats";
        state.poisMode = "html";
        setPill(els.pillMap, "MAP: ATS", "good");
        refreshMiniStatus("ATS");
        await addOverlays();
        updateButtons();
        });
        } catch (err) {
        console.error("ATS PMTiles load failed:", err);
        addFallbackSourcesAndLayers();
        }
        }

        async function pollDrivers() {
        const base = getApiBase();
        const guildId = await resolveGuildId();

        try {
        setPill(els.pillBot, isLocalMapHost() ? "LOCAL: companion" : "BOT: configured", "good");

        const serverText = isLocalMapHost() ? "Local" : (guildId !== "0" ? "Linked" : "No Guild");
        setPill(
        els.pillServer,
        isLocalMapHost() ? "SERVER: local" : (guildId !== "0" ? "SERVER: linked" : "SERVER: no guild"),
        isLocalMapHost() || guildId !== "0" ? "good" : "warn"
        );

        const result = await fetchDriverPayload(base, guildId);
        const drivers = result.drivers || [];
        state.lastDriverUrl = result.url || "";
        state.lastDrivers = drivers;

        let placed = 0;
        const seen = new Set();

        for (const d of drivers) {
        const id = getDriverId(d);
        const lngLat = getLngLat(d);

        if (!lngLat) continue;

        seen.add(id);

        if (!state.markers.has(id)) {
        const built = buildMarker(d);
        built.marker.addTo(state.map);
        state.markers.set(id, built);
        }

        const entry = state.markers.get(id);
        animateMarkerTo(entry, lngLat, 1400);
        entry.label.textContent = getDriverName(d);
        entry.subLabel.textContent = getTruckDisplay(d);
        entry.icon.className = `truckMarker ${dutyClass(d)} ${isFresh(d) ? "" : "stale"}`.trim();
        entry.icon.style.transform = `rotate(${getHeading(d)}deg)`;
        entry.marker.getPopup().setHTML(makePopupHtml(d));
        placed++;
        }

        for (const [id, entry] of state.markers.entries()) {
        if (!seen.has(id)) {
        entry.marker.remove();
        state.markers.delete(id);
        }
        }

        setPill(els.pillDrivers, `DRIVERS: ${drivers.length}`, drivers.length > 0 ? "good" : "");

        if (!state.hasAutoFitDrivers && drivers.length > 0) {
        fitMapToDrivers(drivers);
        state.hasAutoFitDrivers = true;
        }

        if (state.followTruck && drivers.length > 0) {
        const first = getLngLat(drivers[0]);
        if (first) {
        state.map.easeTo({
        center: first,
        duration: 1400,
        essential: true
        });
        }
        }

        refreshMiniStatus(serverText);
        } catch (err) {
        console.error("pollDrivers failed:", err);
        setPill(els.pillServer, "SERVER: error", "bad");
        refreshMiniStatus("Error");
        }
        }

        let __oweldMapStarted = false;

        async function bootstrap(cfg) {
        if (__oweldMapStarted) return;
        __oweldMapStarted = true;

        state.cfg = Object.assign({ botBaseUrl: RAILWAY_API_BASE, guildId: getQueryValue("guildId") }, cfg || {});
        state.fleetRoster = Array.isArray(window.__OWELD_FLEET) ? window.__OWELD_FLEET : [];

        state.map = new maplibregl.Map({
        container: "map",
        style: {
        version: 8,
        sources: {},
        layers: [{
        id: "bg",
        type: "background",
        paint: { "background-color": "#081018" }
        }]
        },
        center: DEFAULT_CENTER,
        zoom: DEFAULT_ZOOM,
        attributionControl: false
        });

        state.map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

        els.btnRecenter.addEventListener("click", recenterUsa);
        els.btnFollow.addEventListener("click", () => {
        state.followTruck = !state.followTruck;
        updateButtons();
        });
        els.btnTogglePois.addEventListener("click", () => {
        state.showPois = !state.showPois;
        updateButtons();
        });
        els.btnToggleRoads.addEventListener("click", () => {
        state.showRoads = !state.showRoads;
        updateButtons();
        });
        els.btnToggleStates.addEventListener("click", () => {
        state.showStates = !state.showStates;
        updateButtons();
        });
        els.btnToggleTopPanel.addEventListener("click", () => {
        state.topPanelCollapsed = !state.topPanelCollapsed;
        refreshPanelVisibility();
        });
        els.btnToggleLegendPanel.addEventListener("click", () => {
        state.legendPanelCollapsed = !state.legendPanelCollapsed;
        refreshPanelVisibility();
        });

        refreshPanelVisibility();
        updateButtons();
        refreshMiniStatus("Starting");

        state.map.once("load", async () => {
        await addAtsPmtilesStyle();
        await pollDrivers();
        await loadVtcGarageMarkers();
        setInterval(async () => {
    await pollDrivers();
    await loadVtcGarageMarkers();
}, 5000);
        });
        }

        window.initializeOverwatchELD = bootstrap;

        // Website/GitHub Pages fallback: if the ELD shell does not call initializeOverwatchELD,
        // start the same map automatically using query string config.
        setTimeout(() => {
            if (!__oweldMapStarted) {
                bootstrap({
                    botBaseUrl: getQueryValue("apiBase") || RAILWAY_API_BASE,
                    guildId: getQueryValue("guildId") || "0"
                });
            }
        }, 150);
    </script>
