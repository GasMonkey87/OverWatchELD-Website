<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OverWatch Garages</title>
  <style>
    body{margin:0;background:#020617;color:#f8fafc;font-family:Segoe UI,Arial}
    .wrap{padding:24px;max-width:1200px;margin:auto}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .nav a{color:#bfdbfe;text-decoration:none;margin-left:10px}
    .card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:16px;margin-top:14px}
    .muted{color:#94a3b8}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
    .owned{border-color:#60a5fa;box-shadow:0 0 22px rgba(96,165,250,.18)}
    .pill{display:inline-block;border:1px solid #334155;border-radius:999px;padding:4px 8px;color:#bfdbfe;background:#082f49;font-size:12px}
    .big{font-size:32px;font-weight:900;margin:8px 0}.row{display:flex;justify-content:space-between;gap:8px;margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Garages</h1><div class="muted">ATS garages + VTC owned locations</div></div>
    <div class="nav"><a id="map">Live Map</a><a id="fleet">Fleet</a><a id="convoy">Convoy</a><a id="loads">Loads</a></div>
  </div>
  <div id="summary" class="card muted">Loading garages…</div>
  <div id="content" class="grid"></div>
</div>
<script>
const qs=new URLSearchParams(location.search);const guildId=qs.get('guildId')||localStorage.getItem('oweld.guildId')||'';if(guildId)localStorage.setItem('oweld.guildId',guildId);
['map','fleet','convoy','loads'].forEach(id=>document.getElementById(id).href=`/${id==='map'?'live-map':id}.html?guildId=${encodeURIComponent(guildId)}`);
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
async function boot(){
  let garages=[];
  try{const r=await fetch(`/api/vtc/garages?guildId=${encodeURIComponent(guildId)}`,{cache:'no-store',credentials:'include'});const d=await r.json();garages=d.garages||d.data||[]}catch{}
  const owned=garages.filter(g=>g.owned||g.isOwned);
  summary.innerHTML=`<b>${owned.length}</b> owned garages · <b>${garages.length}</b> ATS garage locations · owned icons show bold on live map`;
  content.innerHTML=garages.length?garages.map(g=>{
    const isOwned=g.owned||g.isOwned;
    const assigned=g.assigned??(g.trucks||g.assignedTruckNumbers||[]).length??0;
    const cap=g.capacity??g.truckCapacity??g.slots??3;
    return `<div class="card ${isOwned?'owned':''}">
      <span class="pill">${isOwned?'Owned':'ATS'}</span>
      <h2>${esc(g.cityName||g.city||'Garage')}${g.state?', '+esc(g.state):''}</h2>
      <div class="big">${esc(assigned)}/${esc(cap)}</div>
      <div class="muted">${esc(g.size||'Small')} garage · truck slots</div>
      <div class="row"><span>Icon</span><b>${isOwned?'Bold / bright':'Dim'}</b></div>
      ${(g.trucks||g.assignedTruckNumbers||[]).length?`<p>Units: ${esc((g.trucks||g.assignedTruckNumbers).join(', '))}</p>`:''}
      ${g.notes?`<p class="muted">${esc(g.notes)}</p>`:''}
    </div>`}).join(''):'<div class="card muted">No garages available.</div>'
}
boot();setInterval(boot,30000)
</script>
</body>
</html>
